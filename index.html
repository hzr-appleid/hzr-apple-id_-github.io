<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hzr Apple id - Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #f5f5f7;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .profile-card {
            background: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 20px;
            padding: 35px 25px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo-area {
            font-size: 50px;
            color: #ffffff;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 24px;
            margin: 10px 0 5px 0;
            font-weight: 600;
        }
        p {
            color: #8e8e93;
            font-size: 15px;
            margin-bottom: 25px;
        }
        .btn-telegram {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: #0088cc;
            color: #ffffff;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn-telegram:hover {
            background-color: #0077b3;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="logo-area">
            <i class="fab fa-apple"></i>
        </div>
        <h1>Hzr Apple id</h1>
        <p>ب خێر بێی بۆ سایتێ مە یێ فەرمی</p>
        
        <!-- دوگما تێلێگرامێ -->
        <a href="https://t.me/hzr_apple_id" class="btn-telegram" target="_blank">
            <i class="fab fa-telegram-plane"></i>
            تێلێگراما مە
        </a>
    </div>

</body>
</html>
