<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hzr Apple id</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #050505; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin: 30px 0; }
        .logo-box { width: 80px; height: 80px; background: #1c1c1e; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px auto; font-size: 35px; border: 1px solid #2c2c2e; }
        .list-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }
        .item { background: #1c1c1e; padding: 15px 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: white; border: 1px solid #2c2c2e; }
        .item span { font-size: 13px; font-weight: 500; }
        .install-btn { background: #2f80ed; padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-box"><i class="fab fa-apple"></i></div>
        <h2 style="margin: 0;">Hzr Apple id</h2>
        <p style="color: #8e8e93; font-size: 14px;">خزمەتگوزاریێن ئایفۆن و ESign</p>
    </div>

    <div class="list-container">
        <!-- لیستێن ESign -->
        <a href="https://github.com/p3xus/ESign/releases" class="item">
            <span>ESign Official (IPA)</span>
            <div class="install-btn">INSTALL</div>
        </a>
        <a href="https://github.com/p3xus/ESign/releases" class="item">
            <span>ESign Global V1</span>
            <div class="install-btn">INSTALL</div>
        </a>
        <a href="https://github.com/p3xus/ESign/releases" class="item">
            <span>ESign China V1</span>
            <div class="install-btn">INSTALL</div>
        </a>
        <a href="https://github.com/p3xus/ESign/releases" class="item">
            <span>ESign PowerChina</span>
            <div class="install-btn">INSTALL</div>
        </a>
        <a href="https://github.com/p3xus/ESign/releases" class="item">
            <span>ESign Vietnam</span>
            <div class="install-btn">INSTALL</div>
        </a>
    </div>

</body>
</html>
