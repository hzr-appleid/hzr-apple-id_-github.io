<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hzr Apple id</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; text-align: center; margin-top: 40px; }
        .logo-box { width: 120px; height: 120px; background: #1e1e1e; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; font-size: 50px; border: 2px solid #2c2c2e; }
        h2 { margin: 10px 0; font-size: 24px; }
        p { color: #8e8e93; font-size: 14px; margin-bottom: 40px; }
        .section-title { color: #8e8e93; font-size: 13px; text-align: right; margin-bottom: 10px; }
        .link-card { display: flex; align-items: center; justify-content: space-between; background: #1e1e1e; border-radius: 12px; padding: 15px 20px; margin-bottom: 12px; text-decoration: none; color: white; font-size: 15px; }
        .link-card i { color: #007aff; font-size: 18px; }
        .footer { margin-top: 40px; color: #3a3a3c; font-size: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box"><i class="fab fa-apple"></i></div>
        <h2>Hzr Apple id</h2>
        <p>سایتی فەرمی بۆ خزمەتگوزاریێن ئایفۆن و ESign</p>

        <div class="section-title">خزمەتگوزاری و بەستەرەکان</div>

        <a href="#" class="link-card">
            <span>کرینا بەڵگنامەی تایبەت (Certificates)</span>
            <i class="fas fa-shield-alt"></i>
        </a>
        <a href="#" class="link-card">
            <span>دابەزاندنا بەرنامێ ESign ڕاستەوخۆ</span>
            <i class="fas fa-download"></i>
        </a>
        <a href="#" class="link-card">
            <span>کەناڵی مە یێ تێلیگرامی</span>
            <i class="fab fa-telegram-plane"></i>
        </a>

        <div class="footer">Hzr Apple id © 2026 • All Rights Reserved</div>
    </div>

</body>
</html>
