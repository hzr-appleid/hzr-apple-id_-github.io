<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hzr Apple id</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #050505; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; }
        .profile { text-align: center; margin-bottom: 30px; }
        .logo-box { width: 100px; height: 100px; background: #1c1c1e; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px auto; font-size: 45px; border: 1px solid #2c2c2e; }
        .social-icons { display: flex; justify-content: center; gap: 20px; margin: 15px 0; }
        .social-icons a { color: #2f80ed; font-size: 22px; }
        .section-title { color: #8e8e93; font-size: 13px; margin: 25px 0 10px 5px; }
        .list-container { display: flex; flex-direction: column; gap: 10px; }
        .item { background: #1c1c1e; padding: 15px 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: white; border: 1px solid #2c2c2e; }
        .item span { font-size: 14px; font-weight: 500; }
        .install-btn { background: #2f80ed; padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .footer { text-align: center; margin-top: 40px; color: #3a3a3c; font-size: 11px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile">
            <div class="logo-box"><i class="fab fa-apple"></i></div>
            <h2 style="margin: 0;">Hzr Apple id</h2>
            <p style="color: #8e8e93; font-size: 14px;">سایتی فەرمی بۆ خزمەتگوزاریێن ئایفۆن و ESign</p>
            <div class="social-icons">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-snapchat"></i></a>
                <a href="#"><i class="fab fa-telegram"></i></a>
            </div>
        </div>

        <div class="section-title">خزمەتگوزاری و بەستەرەکان</div>
        <div class="list-container">
            <a href="#" class="item"><span>ESign Global V1</span><div class="install-btn">INSTALL</div></a>
            <a href="#" class="item"><span>ESign China V1</span><div class="install-btn">INSTALL</div></a>
            <a href="#" class="item"><span>ESign PowerChina</span><div class="install-btn">INSTALL</div></a>
            <a href="#" class="item"><span>ESign Vietnam</span><div class="install-btn">INSTALL</div></a>
            <a href="#" class="item"><span>ESign SDC V1</span><div class="install-btn">INSTALL</div></a>
        </div>

        <div class="footer">Hzr Apple id © 2026 • All Rights Reserved</div>
    </div>

</body>
</html>
