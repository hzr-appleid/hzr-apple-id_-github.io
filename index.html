<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hzr Apple id - Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #f5f5f7;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .profile-card {
            background: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 24px;
            padding: 35px 25px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
        }
        .logo-area {
            position: relative;
            display: inline-block;
            margin-bottom: 10px;
        }
        .profile-icon {
            font-size: 70px;
            color: #ffffff;
            background: linear-gradient(145deg, #3a3a3c, #1c1c1e);
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #3a3a3c;
            box-shadow: 0 4px 15px rgba(255,255,255,0.05);
        }
        .verified-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: #007aff;
            color: #fff;
            border-radius: 50%;
            padding: 5px;
            font-size: 11px;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 26px;
            color: #ffffff;
            margin: 10px 0 5px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .tagline {
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 25px;
        }
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .social-icons a {
            color: #007aff;
            font-size: 24px;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .social-icons a:hover {
            transform: scale(1.1);
        }
        .section-title {
            text-align: right;
            font-size: 13px;
            color: #8e8e93;
            font-weight: 600;
            margin-bottom: 12px;
            padding-right: 5px;
        }
        .link-button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 14px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: background 0.2s, transform 0.2s;
        }
        .link-button:active {
            transform: scale(0.98);
            background: #3a3a3c;
        }
        .link-button i {
            font-size: 20px;
            color: #007aff;
        }
        .btn-text {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .footer {
            margin-top: 30px;
            font-size: 11px;
            color: #48484a;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="logo-area">
        <div class="profile-icon">
            <i class="fab fa-apple"></i>
        </div>
        <span class="verified-badge"><i class="fas fa-check"></i></span>
    </div>
    
    <h1>Hzr Apple id</h1>
    <div class="tagline">سایتێ فەرمی بۆ خزمەتگوزاریێن ئایفۆن و ESign</div>

    <div class="social-icons">
        <a href="https://snapchat.com/your_username" target="_blank"><i class="fab fa-snapchat"></i></a>
        <a href="https://t.me/your_telegram" target="_blank"><i class="fab fa-telegram"></i></a>
    </div>

    <div class="section-title">خزمەتگوزاری و بەستەرەکان</div>

    <a href="https://t.me/your_telegram" class="link-button">
        <div class="btn-text">
            <i class="fas fa-shield-alt"></i>
            <span>کڕینا بەڵگەنامێن تایبەت (Certificates)</span>
        </div>
        <i class="fas fa-external-link-alt"></i>
    </a>

    <a href="itms-services://?action=download-manifest&url=https://your-link.com/manifest.plist" class="link-button">
        <div class="btn-text">
            <i class="fas fa-download"></i>
            <span>دابەزاندنا بەرنامێ ESign ڕاستەوخۆ</span>
        </div>
        <i class="fas fa-arrow-alt-circle-down"></i>
    </a>

    <a href="https://t.me/your_telegram" class="link-button">
        <div class="btn-text">
            <i class="fab fa-telegram-plane"></i>
            <span>کەناڵێ مە یێ تیلیگرامی</span>
        </div>
        <i class="fas fa-chevron-left"></i>
    </a>

    <div class="footer">Hzr Apple id © 2026 • All Rights Reserved</div>
</div>

</body>
</html>
